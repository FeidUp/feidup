name: Keep Supabase Alive
permissions:
  contents: read
on:
  schedule:
    - cron: '0 12 */5 * *'  # Every 5 days
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -X GET "${SUPABASE_URL}/rest/v1/" -H "apikey: ${SUPABASE_API}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_API: ${{ secrets.SUPABASE_API }}

